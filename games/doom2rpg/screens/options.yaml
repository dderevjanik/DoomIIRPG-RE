screen:
  id: options

  widgets:
    - widget: screen_title
      id: title
      text: "Options"

    - widget: option_menu
      id: options_menu
      x: 100
      y: 60
      w: 280
      h: 180
      items:
        - id: sound
          text: "Sound"
          action: goto:options_sound
        - id: video
          text: "Video"
          action: goto:options_video
        - id: input
          text: "Input"
          action: goto:options_input
        - id: back_item
          text: "Back"
          action: save_and_back
