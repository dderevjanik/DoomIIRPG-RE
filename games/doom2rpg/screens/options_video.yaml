screen:
  id: options_video

  widgets:
    - widget: screen_title
      id: title
      text: "Video Options"

    - widget: option_selector
      id: window_mode
      y: 60
      text: "Window Mode"
      options:
        - label: "Windowed"
          value: 0
        - label: "Fullscreen"
          value: 1
        - label: "Borderless"
          value: 2

    - widget: option_checkbox
      id: vsync
      y: 96
      text: "VSync"
      checked: true

    - widget: option_selector
      id: resolution
      y: 132
      text: "Resolution"
      options:
        - label: "480x320"
          value: 0
        - label: "640x480"
          value: 1
        - label: "720x400"
          value: 2
        - label: "720x480"
          value: 3
        - label: "720x576"
          value: 4
        - label: "800x600"
          value: 5
        - label: "832x624"
          value: 6
        - label: "960x640"
          value: 7
        - label: "1024x768"
          value: 8
        - label: "1152x864"
          value: 9
        - label: "1152x872"
          value: 10
        - label: "1280x720"
          value: 11
        - label: "1280x800"
          value: 12
        - label: "1280x1024"
          value: 13
        - label: "1440x900"
          value: 14
        - label: "1600x1000"
          value: 15
        - label: "1680x1050"
          value: 16
        - label: "1920x1080"
          value: 17

    - widget: option_slider
      id: anim_frames
      y: 168
      text: "Anim Frames"
      min: 2
      max: 15
      step: 1
      value: 8
      fill_color: 0xFF8844CC

    - widget: back_button
      id: back_btn
