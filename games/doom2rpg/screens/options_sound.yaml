screen:
  id: options_sound

  widgets:
    - widget: screen_title
      id: title
      text: "Sound Options"

    - widget: option_checkbox
      id: sound_enabled
      y: 60
      text: "Sound Enabled"
      checked: true

    - widget: option_slider
      id: sfx_volume
      y: 96
      text: "FX Volume"
      value: 100

    - widget: option_slider
      id: music_volume
      y: 132
      text: "Music Volume"
      value: 100

    - widget: back_button
      id: back_btn
