1 = #HOW TO PLAY|Use the di-rec-tion-al pad to move. Tap screen to talk, at-tack and use it-ems.||#OTH-ER|Tap char-acter image to pass turn/skip|Tap Health icon to open In-ven-tory|Tap Ar-mor icon to open Nano Drinks menu|Tap Key-card slots to open PDA|Map: view map|Menu: open menu|Back: prev-ious screen
2 = #HOW TO MOVE|Swipe screen up/down to move for-ward/back-ward.||Swipe screen left/right to strafe.||Use di-rec-tion-al pad to move and turn.
3 = #HOW TO AT-TACK||Tap screen to at-tack/talk/use||Tap wea-pon icon to change to next wea-pon||Hold wea-pon icon to select from all av-ail-a-ble wea-pons||Tap char-acter image to pass turn/skip
4 = #AR-MOR HELP|Ar-mor ab-sorbs a por-tion (about 2/3) of dam-age re-ceived. On the HUD, the amount of dam-age that ar-mor can ab-sorb is dis-played over the ar-mor vest icon.
5 = #EF-FECTS LIST|| \C Haste|| \D Re-gen-er-a-tion|| \E De-fense|| \F Strength|| \G Evade|| \H Fo-cus|| \I Adre-na-line|| \J Anti--Fire|| \K For-ti-tude|| \L Fear|| \M Poi-soned Weap-ons|| \N Fire|| 
6 = #ITEM HELP|You'll en-coun-ter food, pow-er drinks, am-mu-ni-tion, weap-ons, ar-mor, me-di-ca-tion, and oth-er items to aid you. These items may be viewed and used from the In-ven-to-ry menu. ||You can ac-cess the In-ven-to-ry menu from with-in the in--game menu, or you can ac-cess the In-ven-to-ry menu by tap-ping the Health icon on the HUD dur-ing game-play. You can also ac-cess the Nano Drinks sec-tion of the In-ven-to-ry menu by tap-ping the Armor icon on the HUD dur-ing game-play. ||Us-ing an item takes a turn. Af-ter use, if you're at-tacked, you'll re-turn to the game; oth-er-wise you may stay in menu and con-tin-ue to use items. ||#EF-FECTS|Item ef-fects last a num-ber of turns. Ac-tive ef-fects show at the right--hand side of dis-play, along with its re-main-ing turns.||
7 = #SNI-PER RI-FLE||Equip sni-per ri-fle, then tap screen to enter SNI-PER MODE.||In SNI-PER MODE use the scroll-bar to zoom in/out and tilt the dev-ice to aim.||Tap screen to fire.||Tap wea-pon icon to exit.
8 = #HACK-ER|Sort the squares ac-cor-ding to their co-lor on-to the cor-res-pon-ding co-lor col-umn.||Tap square to pick up or drop and tap col-umn to move.
9 = #MA-TRIX SKIP|Find the four cor-rect num-bers to break the code. Use the Skip Code to help you find the num-bers. Start-ing from the top left of the grid, ad-vance to the right as many spa-ces as the Skip Code in-di-cates, and ob-serve the num-ber in the space you land on. If the num-ber in the space is DIF-FER-ENT from the Skip Code, then tap the num-ber to add it to the code at the bot-tom of the screen. If the num-ber in the space is the SAME as the Skip Code, then SKIP this num-ber, and do NOT en-ter it. Re-peat this pro-cess again, start-ing from the last space you land-ed on, and con-tin-ue this pro-cess until all four num-bers are en-ter-ed. Use the Del-ete but-ton to erase the pre-vi-ous number. Use the Sub-mit but-ton to con-firm the code.||||
10 = #POW-ER--UP|Fig-ure out the unique code that adds up to the to-tal. To change a num-ber use up/down. Press the OK button to con-firm the code. If the code is in-cor-rect, you will be giv-en 3 ad-di-tion-al chanc-es to fix the in-cor-rect code.
