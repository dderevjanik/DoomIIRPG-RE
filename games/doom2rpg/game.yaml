# Doom II RPG - Game Definition
# This is the default game that ships with the engine.

game:
  name: Doom II RPG
  description: The classic Doom II RPG, reverse-engineered and enhanced
  version: "1.0"

  # Window title (defaults to name if not set)
  window_title: Doom II RPG By [GEC]

  # Save directory for config/profile data
  save_dir: Doom2rpg.app

  # Entry map (first map loaded on new game)
  entry_map: map00

  # Map IDs where fog is disabled (e.g. outdoor maps)
  no_fog_maps: [2]
