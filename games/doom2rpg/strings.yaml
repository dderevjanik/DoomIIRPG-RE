  # english / FileStrings
  - language: 0
    group: 2
    values:
      - "|Id Software LLC,|a division of ZeniMax Media Inc.||\x80\x80\x80\x80 CRE-DITS \x80\x80\x80\x80||Pro-duc-er|KATHERINE A. KANG||Pro-gram-ming|JOHN CARMACK|GRAYSON WENDELL|JACOB ENGET|GREG HODGES||De-sign|KATHERINE A. KANG|MATTHEW C. ROSS|ERIK WESSLEN|MICHAEL WILLIAMS||Art-work|MATTHEW C. ROSS|LISA A. KESTER|JAMES CARY||Mu-sic and Sound|CHRISTIAN ANTKOW|BOBBY PRINCE||Biz|STEVE NIX||||Director of QA|DARREN MANES||QA Manager|ROB GRAY||QA Lead|JAMES COSTANTINO||Testers|ROB CLARK|JON DEVRIENDT|LADAWNA GROW|MARISA LYON|JOE MUELLER|MATT PONTON|GREG RUDDICK|CHRIS STEIDEL|LARRY WALDMAN||||||||||Thanks for Play-ing!||"
      - "#HOW TO PLAY|Use the di-rec-tion-al pad to move. Tap screen to talk, at-tack and use it-ems.||#OTH-ER|Tap char-acter image to pass turn/skip|Tap Health icon to open In-ven-tory|Tap Ar-mor icon to open Nano Drinks menu|Tap Key-card slots to open PDA|Map: view map|Menu: open menu|Back: prev-ious screen"
      - "#HOW TO MOVE|Swipe screen up/down to move for-ward/back-ward.||Swipe screen left/right to strafe.||Use di-rec-tion-al pad to move and turn."
      - "#HOW TO AT-TACK||Tap screen to at-tack/talk/use||Tap wea-pon icon to change to next wea-pon||Hold wea-pon icon to select from all av-ail-a-ble wea-pons||Tap char-acter image to pass turn/skip"
      - "#AR-MOR HELP|Ar-mor ab-sorbs a por-tion (about 2/3) of dam-age re-ceived. On the HUD, the amount of dam-age that ar-mor can ab-sorb is dis-played over the ar-mor vest icon."
      - "#EF-FECTS LIST|| \\C Haste|| \\D Re-gen-er-a-tion|| \\E De-fense|| \\F Strength|| \\G Evade|| \\H Fo-cus|| \\I Adre-na-line|| \\J Anti--Fire|| \\K For-ti-tude|| \\L Fear|| \\M Poi-soned Weap-ons|| \\N Fire|| "
      - "#ITEM HELP|You'll en-coun-ter food, pow-er drinks, am-mu-ni-tion, weap-ons, ar-mor, me-di-ca-tion, and oth-er items to aid you. These items may be viewed and used from the In-ven-to-ry menu. ||You can ac-cess the In-ven-to-ry menu from with-in the in--game menu, or you can ac-cess the In-ven-to-ry menu by tap-ping the Health icon on the HUD dur-ing game-play. You can also ac-cess the Nano Drinks sec-tion of the In-ven-to-ry menu by tap-ping the Armor icon on the HUD dur-ing game-play. ||Us-ing an item takes a turn. Af-ter use, if you're at-tacked, you'll re-turn to the game; oth-er-wise you may stay in menu and con-tin-ue to use items. ||#EF-FECTS|Item ef-fects last a num-ber of turns. Ac-tive ef-fects show at the right--hand side of dis-play, along with its re-main-ing turns.||"
      - "#SNI-PER RI-FLE||Equip sni-per ri-fle, then tap screen to enter SNI-PER MODE.||In SNI-PER MODE use the scroll-bar to zoom in/out and tilt the dev-ice to aim.||Tap screen to fire.||Tap wea-pon icon to exit."
      - "#HACK-ER|Sort the squares ac-cor-ding to their co-lor on-to the cor-res-pon-ding co-lor col-umn.||Tap square to pick up or drop and tap col-umn to move."
      - "#MA-TRIX SKIP|Find the four cor-rect num-bers to break the code. Use the Skip Code to help you find the num-bers. Start-ing from the top left of the grid, ad-vance to the right as many spa-ces as the Skip Code in-di-cates, and ob-serve the num-ber in the space you land on. If the num-ber in the space is DIF-FER-ENT from the Skip Code, then tap the num-ber to add it to the code at the bot-tom of the screen. If the num-ber in the space is the SAME as the Skip Code, then SKIP this num-ber, and do NOT en-ter it. Re-peat this pro-cess again, start-ing from the last space you land-ed on, and con-tin-ue this pro-cess until all four num-bers are en-ter-ed. Use the Del-ete but-ton to erase the pre-vi-ous number. Use the Sub-mit but-ton to con-firm the code.||||"
      - "#POW-ER--UP|Fig-ure out the unique code that adds up to the to-tal. To change a num-ber use up/down. Press the OK button to con-firm the code. If the code is in-cor-rect, you will be giv-en 3 ad-di-tion-al chanc-es to fix the in-cor-rect code."
      - "Cust-o-mer ser-vice:|Send email to iphonesupport@idsoftware.com.||DOOM II RPG\x99 \xA9 2010 id Soft-ware LLC, a ZeniMax Me-dia com-pany. DOOM, DOOM II (styl-ized), DOOM II RPG, ID, and re-la-ted logos are trade-marks or re-gi-ster-ed trade-marks of id Soft-ware LLC in the Uni-ted States and/or other coun-tries.  ZeniMax and the ZeniMax logo are trade-marks or re-gi-ster-ed trade-marks of ZeniMax Me-dia Inc. in the Uni-ted States and/or other coun-tries. All Rights Re-ser-ved."
      - " \x80\x80 Mis-sion Up-date \x80\x80|Greet-ings, %01. Mars De-par-ture has cleared us for fre-quen-cy change and trans--Earth in-jec-tion. Des-ti-na-tion set for Earth's moon -- Ty-cho Sta-tion. Stand by for pri-ma-ry burn."
