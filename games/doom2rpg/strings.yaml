      - "You made it! The oth-ers are head-ing to Kep-ler; the trou-ble seems to have start-ed up there. You should hur-ry if you want to join them. The rail sta-tion is past the car-go bays and Kep-ler is two stops along the Maglev rail."
      - "Get to the Maglev sta-tion, it'll take you to Ci-chus base. From there con-tin-ue on to Kep-ler. I'll try to fol-low, but first I've got to try to sta-bi-lize this se-cu-ri-ty sys-tem."
