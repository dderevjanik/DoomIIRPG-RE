# String tables for DoomIIRPG
# Special character escapes:
#   \x80 = line separator    \x84 = cursor2      \x85 = ellipsis
#   \x87 = checkmark         \x88 = mini-dash    \x89 = grey line
#   \x8A = cursor            \x8B = shield       \x8D = heart
#   \x90 = pointer           \xA0 = hard space
#   | = newline (in-game)     - = soft hyphen (word-break hint)
#
# String IDs in code: STRINGID(group, index) = (group << 10) | index

