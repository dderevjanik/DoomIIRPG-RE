      - "COMM LINK: I've got the Dr. and a civie with me. We've made it up to Kep-ler but I could use your help. I stashed a key-card for you in the ca-fe-te-ria in Ci-chus. Use the food tray con-veyor a few times and it'll come around. *crack-le*"
