      - "Lo-cate key-card in the ca-fe-te-ria food con-veyor."
      - "You got the Ho-ly Wa-ter Pis-tol"
      - "Liv-ing Quar-ters Log:|We've holed up in here to try to hide from those\x85 what-ever they are. Beau-champ in Com-mu-ni-ca-tions in-ter-cept-ed some-thing from head-quar-ters about some \"por-tals\" pop-ping up\x85 wait\x85 BRB, Landau is here. HELP! LANDAU IS WITH THEM. HE HAS BEEN\x85"
      - "No more Logs"
      - "Ci-vil-ian 1: What the Hell are you do-ing?! Steal-ing cre-dits while the world is crumb-ling around us?! "
      - "Ci-vil-ian 2: If the world is end-ing, what do you care?"
      - "Ci-vil-ian 1: Wait! Stop! PUT THAT WEA-PON AWAY! I HAVE THE DROP ON YOU!"
