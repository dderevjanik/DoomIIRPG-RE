  # english / M_01
  - language: 0
    group: 4
    values:
      - ""
      - "Ty-cho"
      - "RE-MIND-ER|You can save your game at any time. To save game, press Menu to open menu then se-lect \"Save Game.\""
      - "HINT|To pass a turn and stay in place, tap character image."
      - "HINT|To change your weap-ons, tap on the weap-on icon."
      - "HINT|Health Packs re-store 80 health points. Use them wise-ly. "
      - "HINT|Push-ing against some walls un-covers se-crets."
      - "HINT|You can side step left and right -- to side step left, swipe screen left, to side step right, swipe screen right."
      - "HINT|Ar-mor helps re-duce the amount of dam-age an en-e-my does to you. If you have ar-mor, equip it by press-ing Menu to ac-cess the menu then choose in-ven-to-ry."
      - "Cap-tain: Eve-ry-one, bu-ckle up!"
      - "Cap-tain: We're land-ing at Ty-cho Sta-tion."
      - "Cap-tain: Rough land-ing. Sor-ry about that!"
      - "Cap-tain: What the\x85 what was that?!"
      - "Major: Some-thing strange is go-ing on here. "
      - "Some-thing strange is go-ing on here. "
      - "Major: Eve-ry-one, be on guard."
      - "Eve-ry-one, be on guard."
      - "HELP! There's\x85"
      - "Die hell spawn!"
      - "Fol-low me! HUR-RY!!"
      - "Caldex"
      - "It's about time you got here! We need all the as-sis-tance we can get. Hur-ry, let's get mov-ing!"
      - "Some-one needs to stay here to meet the rest of our squad."
      - "Some-one needs to stay here to meet the rest of our squad. I'll stay. The rest of you move out."
      - "I'll stay."
      - "Al-right, you'll need this then. With luck, we'll meet up soon."
      - "We'll stay in touch via our comm link. Stay alert!"
      - "Let's go!"
      - "This area is un-sta-ble. You have to get out of here! "
      - "I can't aban-don the squad."
      - "Caldex said to get you out! I'll stay in the next room and wait as long as I can. Hur-ry!"
      - "How do I find the oth-ers?"
      - "They're head-ing to Maglev sta-tion. You'll need a blue key-card to get through. I gave mine to Caldex and\x85 the tech in this room has the oth-er one. Er\x85 I mean, what's left of him. Search the body and get the key-card\x85 you don't have much time."
      - "Are you kid-ding me?! You want me to loot the corpse to your right?"
      - "Did-n't know I'd be knee deep in the dead so soon."
      - "You're go-ing. I'm stay-ing. The on-ly way to get out is that key-card. I sug-gest you hur-ry up. Pick up the key-card, ga-ther as many sup-plies as you can and go!"
      - "Find Maglev sta-tion to find the rest of your par-ty."
      - "Loot the corpse to get the Blue Key-card."
      - "Get the blue key-card off that\x85 body over there."
      - "Maglev sta-tion is near the car-go bays. Hur-ry!"
      - "Please, go. I'll wait as long as I can."
      - "LOOT-ING|To loot, stand next to a corpse, face it, then tap screen. A corpse that can be loot-ed will have a glow-ing out-line."
      - "Major Morgan"
      - "Sgt. Blazkowicz"
      - "Dr. O'Connor"
      - "Damn! I have to warn the cap-tain and re-main-ing crew."
      - "COMM LINK: Dead-eye, this is Maelstrom, over."
      - "COMM LINK: Dead-eye, this is Ci-gar, over."
      - "COMM LINK: Um, hel-lo? This is Dr. O'Connor. Can any-one hear me?"
      - "*hisss*"
      - "Comm link's dead\x85 I have a bad feel-ing things are go-ing to get worse."
      - "I should try to con-tact the squad."
      - "I should try the Comm Link again."
      - "COMM LINK: Fire-star One this is Maelstrom, over."
      - "COMM LINK: Fire-star One this is Ci-gar, over."
      - "COMM LINK: Hel-lo? Can any-one hear me? This is Dr. O'Connor."
      - "Comm link is dead\x85"
      - "Still dead\x85"
      - "Whoa!"
      - "Voice across shaft:|THE BRIDGE IS OFF-LINE! YOU NEED TO POW-ER IT UP WITH THAT COM-PU-TER ON YOUR LEFT!"
      - "Come on over!"
      - "Thanks! The sys-tems are go-ing hay-wire and the peo-ple too. I mean, some of the crew are turn\x85 turn\x85 I\x85 gggrl-rgl\x85 I don't feel so good\x85"
      - "Argh!"
      - "DAHHH!"
      - "You start-led me! Oh great, anoth-er Ma-rine! So are you go-ing to help or just stand there? Ugh, don't bo-ther an-swer-ing."
      - "What the\x85"
      - "Oh sor-ry! You start-led me. Well, it's good that we have anoth-er sci-en-tist in our midst. Hope-ful-ly you can help us fig-ure out what's go-ing on around here."
      - "Gaahh!"
      - "Door Mal-func-tion"
      - "Ty-cho Stor-age 2B Log:|Al-vin, did you sign for this ship-ment of chain-saws? Super-vi-sor Kim in Car-go is giv-ing me lip about it. They were sup-posed to go up to Kep-ler. What use are they here?|--S.A. Fel-lows"
      - "Ty-cho Stor-age 2B Log:|Wasn't me\x85 but you can AL-WAYS use a good chain-saw!|--Al-vin McPeak"
      - "Se-cure stor-age ter-mi-nal lock-ed down."
      - "Do you want to try to hack this com-pu-ter?"
      - "Se-cure stor-age ac-cess grant-ed."
      - "Se-cure stor-age ac-cess de-nied."
      - "Se-cure Stor-age al-ready un-locked."
      - "Sys-tem Err-or:|Pow-er Fail-ure. Re-store pow-er in sub-sta-tion to pro-ceed."
      - "Dis-abled"
      - "Pow-er Sub-sta-tion"
