      - "TALK|Tap screen to talk to char-ac-ters with chat bub-bles."
      - "LOCK-ED OB-JECT|Un-lock with a key-card. Find the cor-rect key-card to ac-ti-vate."
      - "WIN-DOW|De-stroy with most wea-pons."
      - "CRATE|Tap screen to open and get con-tents"
