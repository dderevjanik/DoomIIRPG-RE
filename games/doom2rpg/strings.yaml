      - "AR-MOR RE-PAIR STA-TION|Use to turn 5 ar-mor shards in-to a flak jac-ket.  Do-ing so will give you a per-ma-nent boost to your de-fense."
      - "SEN-TRY BOT DIS-CARD|You can hold on-ly one sen-try bot at a time. Since you hacked anoth-er sen-try bot, your old bot has been dis-card-ed. You may re-trieve the dis-card-ed bot when you no long-er have a bot on hand."
      - "VIR-TUAL TAR-GET PRAC-TICE|To be-come a great marks-man, go for head-shots, it's an auto-ma-tic crit-i-cal. Prac-tice makes per-fect! Zoom in and out us-ing the scroll bar, and ad-just the cross-hair po-si-tion by tilt-ing the dev-ice. Ses-sion ends af-ter 8 shots. Tap screen af-ter 8 shots to exit tar-get prac-tice."
      - "TREAD-MILL WORK-OUT|Be-come more agile by run-ning on tread-mills.  Al-ter-nate press-ing the left and right icons to take steps.  Tim-ing is cru-cial; step-ping too slow or too fast will cause you to fall off!"
