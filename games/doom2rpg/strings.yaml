      - "Fas-cin-a-ting\x85"
      - "*sigh* I'm SAL, UAC's cen-tral main-frame."
      - "SAL? What kind of name is SAL?"
      - "It's a good ac-ro-nym. Nice to meet you, SAL."
      - "You're a very rude hu-man."
      - "Sor-ry. Hey, SAL, since you're the main-frame, you must have ac-cess to eve-ry-thing hap-pen-ing around here. Can you tell me what's go-ing on?"
      - "If I give you some in-for-ma-tion, pro-mise to re-move your-self from this fa-cil-i-ty."
      - "Thank you for the offer, SAL. That is gen-er-ous of you."
      - "That's what I'm try-ing to do!"
      - "Some hu-mans have un-leashed a strange en-ti-ty that I can-not com-pre-hend. This en-ti-ty has quite a bit of con-trol over the ma-te-ri-al and cy-ber worlds. It is very dan-ger-ous and it has made it un-safe here."
      - "Now you must leave. I've un-locked the door up ahead. Use cau-tion -- I sense this en-ti-ty is afoot. Move along now."
