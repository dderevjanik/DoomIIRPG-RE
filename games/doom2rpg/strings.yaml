      - "No Bot Ac-cess"
      - "Sen-try Bot Sta-tus:|Al-ready De-ployed"
      - "Email:|To: J. Samuel-son|From: G. Van-der-hat|Je-re-my, I just want-ed to let you know that the dig is pro-gress-ing at an alarm-ing rate. We've be-gun ex-ca-va-ting a large cav-ern and the ele-va-tor sys-tem has been up and run-ning for some time. The team is very ex-ci-ted about po-ten-tial dis-co-ver-ies but are still con-cern-ed about se-cu-ri-ty and work-ing out-side the pri-ma-ry per-i-me-ter.|--Gar-ret"
      - "Email:|To: G. Van-der-hat|From: J. Samuel-son|Gar-ret, I un-der-stand your men may be con-cern-ed for their safe-ty, but you must be-lieve me when I say we have the best men in the com-pany on se-cu-ri-ty de-tail. Just keep the dig go-ing and we'll all get home safe and sound once we're fin-ished.|--Je-re-my"
      - "Email:|To: J. Samuel-son|From: G. Van-der-hat|Je-re-my, I know we've got the best team in com-pany, but my men are still wor-ried. There have been more tre-mors and even more strange noi-ses com-ing from various cav-erns. Our pro-gress has in-creased due to the fact that the men just want to get out of here.|--Gar-ret"
      - "Email:|To: J. Samuel-son|From: I. Kelliher|Je-re-my, I was won-der-ing just where we were in terms of ex-ca-va-tion at the new out-post. Please up-date me as soon as pos-si-ble.|--CEO Kelliher"
      - "Email:|To: I. Kelliher|From: J. Samuel-son|Mr. Chair-man, We are mak-ing pro-gress at an alarm-ing rate, how-ev-er the casual-ty rate is in-creas-ing. The work-ers are be-coming more con-cern-ed and I feel they may strike in due time.|--Je-re-my"
      - "Email:|To: J. Samuel-son|From: I. Kelliher|Je-re-my, I want you to un-der-stand some-thing. Cas-ual-ties are min-or set-backs. It is im-por-tant that the ex-ca-va-tion con-tin-ues un-al-tered. Do what-ever it takes, and I mean that.|--CEO Kelliher"
