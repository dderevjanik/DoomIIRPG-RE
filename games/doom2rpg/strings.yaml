  # english / M_04
  - language: 0
    group: 7
    values:
      - ""
      - "UAC Ad-min"
      - "Hey, how did you get in here?!"
      - "I'm not ex-act-ly sure\x85 where am I?"
      - "This is UAC's East Coast re-search fa-cil-i-ty."
      - "East Coast? The Moon doesn't have an East Coast!"
      - "Moon? What are you talk-ing about? You're on Earth! You bump your head or some-thing?"
      - "I'm\x85 on\x85 Earth?"
      - "You're spook-ing me. I don't know what you're up to but I want no part of it."
      - "For-get it. Just tell me how to get out of here."
      - "Get out? The fa-cil-i-ty is un-der lock-down. You're stuck un-til it's over."
      - "You mean there's ab-so-lute-ly no way to get out of here?!"
      - "Well, if you got ac-cess to the labs and hacked in-to the ad-min-is-tra-tor's com-pu-ter, may-be you could get out\x85 but I would-n't go there if I were you. Lots of weird things go-ing on and I'm not so sure it's safe up there."
      - "I'll try my luck."
      - "You'll need a blue se-cu-ri-ty card to get in-to the ad-min-is-tra-tor's of-fice. I think there's one in the of-fice up the ramp from the square cor-ridor\x85 if you're cra-zy enough to go get it. Well, I've got to get back to work so ex-cuse me."
      - "I'm busy. Got work to do."
      - "Where did you come from?"
      - "Nev-er-mind\x85 how do I get out of here?"
      - "Umm, we're un-der lock-down\x85"
      - "Yeah, I got that part. Which way to the labs?"
      - "Umm, out the door?!"
      - "Leave me alone\x85 you're strange."
      - "Great, just need to make my way to the ad-min-is-tra-tor's of-fice."
      - "WORK-ER: EAT LEAD YOU MON-STER!"
      - "WORK-ER: Ugh, how do I dis-en-gage the safe-ty?"
      - "WORK-ER: AHH!!!"
      - "RE-MIND-ER|Save your game at any time. Press \"Menu\" to open the menu and se-lect \"Save Game\"."
      - "Email:|To: E. Bax-ter|From: K. Pomme|Erik, any word on when the guys down in R&D are go-ing to be fin-ished with the next pro-to-type? I have up-per man-age-ment breath-ing down my neck here and I don't have any-thing to do un-til the pro-to-type is ready. The share hold-ers meet-ing is less than a month away and they want some-thing con-crete to show in-ves-tors.|--Kim"
      - "Email:|To: K. Pomme|From: E. Bax-ter|Kim, the pro-to-type is still a few weeks out. If you're real-ly look-ing for some-thing to do you could go vo-lun-teer as a test subject\x85|--Erik"
      - "Email:|To: E. Nieslen|From: K. Pomme|Very fun-ny Erik. I know what goes on down in those labs and there's no way I'm go-ing to set one foot down there. Just tell the guys to hur-ry up and fin-ish the pro-to-type.|--Kim"
      - "UAC Coded Ad-vi-so-ry:|The ad-min-is-tra-tion lev-el and oth-er sub-lev-els are un-der lock-down un-til the cur-rent si-tu-a-tion is re-sol-ved. All per-son-nel should re-main calm and con-tin-ue work as di-rect-ed."
      - "Email:|To: Ad-min Al-bert-son|From: I. Kelliher|Ad-min-is-tra-tor Al-bert-son, our re-search-ers on Mars in-form me that they are wait-ing on the re-sults of sev-er-al ex-per-i-ments as-signed to your fa-cil-i-ty. Please let me know where these ex-per-i-ments stand.|--CEO Ian Kelliher"
      - "Email:|To: I. Kelliher|From: Ad-min Al-bert-son|Mr. Chair-man, our sci-en-tists are work-ing full sched-ules but we are un-a-ble to keep up with the amount of work that has been as-signed to our fa-cil-i-ty. If we try to in-crease our yield we will be op-er-at-ing out-side safe pa-ra-me-ters.|--Ad-min-is-tra-tor Al-bert-son"
      - "Email:|To: Ad-min Al-bert-son|From: I. Kelliher|Ad-min-is-tra-tor Al-bert-son, your job is to in-sure that the com-pany sees re-sults. If you are un-a-ble to pre-sent those re-sults you may need to re-think the way you oper-ate your fa-cil-i-ty, or I may need to re-think who is in charge.|--CEO Ian Kelliher"
      - "Email:|To: G. Mumbi|From: E. Water-son|Gandhi, what is up with these print-ers? I can't get a sin-gle one to work pro-per-ly. Can we get some-one to fix these.|--E. Water-son"
      - "Email:|To: E. Water-son|From: G. Mumbi|Mr. Water-son, I am sor-ry you are hav-ing trou-ble with our print-ers to-day. Could you please send me your cust-o-mer ser-vice num-ber? Once I get that in-for-ma-tion I will be in a bet-ter po-si-tion to help you.|--G. Mumbi"
      - "Email:|To: G. Mumbi|From: E. Water-son|Gandhi, what cust-o-mer ser-vice num-ber are you talk-ing about? I did-n't buy these damn things, I have no idea who did, and I have no idea where that num-ber could be. Just send some-one to fix the print-er!|--E. Water-son"
      - "*Print-er Queue*|Lisa -- Gra-phic Doc|Lisa -- Test Doc|John -- Gra-phic Doc|Lisa -- Gra-phic Doc|Erik -- Blank Page"
      - "Email:|To: J. Alard|From: W. Gate|James, I real-ly need the pro-duct sum-ma-ries for the meet-ing to-mor-row, any idea when you'll have them ready?|--Bill"
      - "Email:|To: W. Gate|From: J. Alard|Bill, I'll have them on your desk first thing in the morn-ing, sor-ry about the de-lay. A lot of my staff has been sick so its been a lit-tle hard to get eve-ry-thing done.|--James"
      - "Email:|To: J. Alard|From: W. Gate|James, Thank you. Hope-ful-ly your team will start feel-ing bet-ter soon enough.|--Bill"
      - "Email:|To: E. Wido|From: A. Feng|El-len, have you heard from the di-rec-tor? We've been in de-ve-lop-ment for a few months now and we're wait-ing on pro-duct feed-back be-fore we move in-to the next phase of de-ve-lop-ment.|--An-drew"
      - "Email:|To: A. Feng|From: E. Wido|An-drew, I haven't seen the di-rec-tor in quite some time. He's been out of the of-fice for a while now. He's caught some-thing nas-ty, must've picked it up while he was in Ve-gas a few months ago. You know how cra-zy it can be over there.|--El-len"
      - "Email:|To: E. Wido|From: A. Feng|El-len, I do know how cra-zy it can get. If you do see the di-rec-tor can you send him my way? I've got a ton of ques-tions I'd like to ask.|--An-drew"
