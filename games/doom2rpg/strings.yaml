      - "Email:|To: D. Quinn|From: R. Antema|Mr. Quinn, is it real-ly nec-es-sary to take oth-er peo-ple's lun-ches out of the fridge? There's a ven-ding ma-chine down the hall, you know!|--Dr. Antema"
      - "Email:|To: R. Antema|From: D. Quinn|Dr. Ene-ma, I do NOT take oth-er peo-ple's lun-ches. I would-n't eat your food if it was the last mor-sel on the Moon. The stuff you eat is so foul it makes me gag just think-ing about it\x85 and the gas-es you ex-pel are ab-so-lute-ly pu-trid. Keep the stink in your own cu-bi-cle!|--Dave"
      - "Email:|To: D. Quinn|From: R. Antema|It's Antema, you mo-ron! And it's not me con-tam-i-na-ting the hall-ways you thief!|--Dr. Antema"
      - "Email:|To: All Employees|From: Caldex|What is all this talk about de-mons and pos-ses-sed souls? I want any-one who is aware of the source of these ru-mors to re-port to me im-me-di-ate-ly.|--Caldex"
      - "No More Mes-sages"
      - "Email:|To: P. Ham-er-shock|From: L. De-chant|Pat-ricia, I've been at the ter-mi-nals in the pow-er sub-sta-tion for hours; we're bare-ly run-ning at base-line. Some of the guys here are get-ting spo-oked. Do you have any news on what's go-ing on?|--Lee"
      - "Email:|To: L. De-chant|From: P. Ham-er-shock|We're as much in the dark as you are. The folks here are pret-ty ner-vous too. Some are spout-ing non-sense about pos-ses-sed souls. Just keep those se-cu-ri-ty bridges on-line; ap-par-ent-ly we've got Ma-rines on the way.|--Pat-ricia"
      - "Email:|To: P. Ham-er-shock|From: L. De-chant|Ma-rines? In-te-rest-ing\x85 did-n't think this was a com-bat si-tu-a-tion. Any-way, un-less the pow-er sta-bi-li-zes, we'll have to call off death-match to-night.|--Lee"
      - "Email:|To: C. Castle|From: M. Lake|Cal, what's go-ing on at the Kep-ler Site? My sub-or-di-nates are throw-ing around ru-mors like spit-wads.|--Max"
      - "Email:|To: C. Castle|From: M. Lake|Cal, did you get my earlier mes-sage? What's go-ing on there?|--Max"
      - "Email:|To: M. Lake|From: C. Castle|Max, we need help! There are weird\x85 crea-tures ap-pearing out of no-where and some peo-ple down here are turn-ing [rest of mes-sage trun-cated]"
      - "Email:|To: C. Castle|From: M. Lake|Cal, some peo-ple are head-ing out to Ci-chus base to help. Hang in there!|--Max"
      - "Email:|To: Staff|From: Dir. Amador|It has come to my at-ten-tion that un-au-tho-rized per-son-nel have been us-ing Super-vi-sor Lake's wash-room. This is a PRI-VATE wash-room. Any-one caught vio-lat-ing this will be ter-mi-nated im-me-di-ate-ly.|--Of-fice of the Di-rec-tor"
      - "Email:|To: Dir. Amador|From: Har-ry Larry|Why does Lake have his own pri-vate wash-room while the rest of us have to trudge all the way to the oth-er side of the sta-tion to take a leak? What are we sup-posed to do when the se-cu-ri-ty bridges are off-line, piss down a shaft?|--Har-ry"
      - "Email:|To: Staff|From: M. Lake|I have a hand-i-cap that makes it nec-es-sary that I have my own pri-vate fa-ci-li-ties. It is writ-ten in my em-ploy-ment con-tract. I sug-gest you plan ahead and stay away from my pri-vate wash-room.|--M. Lake"
      - "Email:|To: M. Lake|From: Har-ry Larry|Yeah, you're hand-i-cap-ped al-right. Plan ahead my ASS!|--Har-ry"
      - "Car-go Bay Doors"
      - "Ty-cho Sta-tion Maglev:|Trans-port to Ci-chus base ready for im-me-di-ate de-par-ture."
