    values:
      - "As-sault Ri-fle"
      - "An auto-mat-ic ri-fle with 2 shots per turn."
      - "Chain-saw"
      - "Pow-er-ful me-lee wea-pon for sli-cing and di-cing op-po-nents, and break-ing de-struc-ti-ble ob-jects such as chairs and tab-les. Use this wea-pon on mon-sters enough and your strength will in-crease!"
      - "Ho-ly Wa-ter Pis-tol"
      - "A sa-cred amu-let charms the wa-ter in-side and creates ho-ly wa-ter; bad news for Hell-spawn. Crea-tures from Hell will take dam-age and be-come ter-ri-fied of you when at-tacked with this wea-pon. Re-fill at sinks, toi-lets, and wa-ter spouts. You can al-so drink the ho-ly wa-ter to re-gain health and in-still fear in mon-sters. To use this func-tion-al-ity, press MENU then se-lect \"In-ven-to-ry\"."
      - "Shoot-ing Bot"
      - "Shoot-ing Sen-try Bot"
      - "Can be used to scout near-by ar-eas, col-lect items, and de-stroy en-e-mies with mount-ed ri-fle. Sen-try bots are im-per-vious to fire, and you can on-ly have one sen-try bot at a time. You can dis-card your bot by press-ing dis-card while the sen-try bot is equipped. Dis-card-ed sen-try bots can be picked back up at a lat-er time."
      - "Ex-plo-ding Bot"
      - "Ex-plo-ding Sen-try Bot"
      - "Can be used to scout near-by ar-eas, col-lect items, and de-stroy en-e-mies with a self--de-struct me-cha-nism. Sen-try bots are im-per-vious to fire, and you can on-ly have one sen-try bot at a time. You can dis-card your bot by press-ing dis-card while the sen-try bot is equipped. Dis-card-ed sen-try bots can be picked back up at a lat-er time."
      - "Su-per Shot-gun"
      - "A pow-er-ful close--range wea-pon. Fires 2 shells at a time. "
      - "Chain-gun"
      - "A mighty gun that fires 4 pow-er-ful shots in one turn. Uses reg-u-lar bul-lets."
      - "Ri-fle with Scope"
      - "As-sault Ri-fle w/ Scope"
      - "The attached scope al-lows for very pre-cise tar-get-ing. Aim for soft spots!"
      - "Plas-ma Gun"
      - "Fires bursts of en-er-gy at a rate of 3 per turn. Good for en-e-mies that won't back down."
      - "Rock-et Launch-er"
      - "Fires pow-er-ful rock-ets that ex-plode on con-tact. Just make sure you are far enough from where the dam-age hap-pens!"
      - "BFG"
      - "The. Ul-ti-mate. Gun.  Shoots a slow--mov-ing ball of green plas-ma that con-tains a small com-pu-ter chip. This chip iden-ti-fies and shoots rays at op-po-nents be-fore the ini-ti-al ex-plo-sion that will kill most de-mons near the blast."
      - "Soul Cube"
      - "\"We are many, we are one; we are the Prael-ean-thor, you know us as the Soul Cube.\" Pow-ered with the life force li-be-ra-ted fol-low-ing the death of any en-e-my,  5 kills will leave the Cube ful-ly--charged and ready to wreak havoc."
