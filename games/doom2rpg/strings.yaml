      - "Find the four cor-rect num-bers to break the code. Use the Skip Code to help you find the num-bers. Start-ing from the top left of the grid, ad-vance to the right as many spa-ces as the Skip Code in-di-cates, and ob-serve the num-ber in the space you land on. If the num-ber in the space is DIF-FER-ENT from the Skip Code, then tap the num-ber to add it to the code at the bot-tom of the screen. If the num-ber in the space is the SAME as the Skip Code, then SKIP this num-ber, and do NOT en-ter it. Re-peat this pro-cess again, start-ing from the last space you land-ed on, and con-tin-ue this pro-cess until all four num-bers are en-ter-ed. Use the Del-ete but-ton to erase the pre-vi-ous number. Use the Sub-mit but-ton to con-firm the code."
