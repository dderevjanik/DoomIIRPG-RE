      - "JIG IT!"
      - "YEAH!"
      - "Oh, hey man\x85 umm, did you need some-thing?"
      - "Oh, hey\x85 umm, did you need some-thing?"
      - "Were you just\x85 dan-cing?"
      - "Umm\x85 may-be? Well, I'm very busy so if you don't mind, I have work to do."
      - "Why are you fol-low-ing me?"
      - "I was hop-ing you might be able to help me find the ca-fe-te-ria."
      - "I need to get to the ca-fe-te-ria."
      - "Oh, I wouldn't go out there if I were you. If you're real-ly hun-gry, find a ven-ding ma-chine. It's real-ly ug-ly out there. I'd stay put if I were you."
      - "Not an op-tion."
      - "*sigh* Un-for-tu-nate-ly, I don't be-lie-ve that is an op-tion."
      - "Humm, okay but I sug-gest you take one of these bots. They'll come in han-dy. If you come up against a ma-chine like this, hack the sys-tem to get one of these ba-bies. They may save your hide. "
      - "What are they for?"
      - "This one's a shoot-er bot. It'll do some snoop-ing, pick up some use-ful items and even shoot mon-sters. You can de-ploy it at will."
      - "These may in-deed come in han-dy. Thanks!"
      - "Hey, did you ever hear about the moon walk dance? I saw it in some an-cient vi-deo and it was pret-ty slick. Check it out!"
      - "Uhhh\x85 okay\x85 hey, where're you go-ing?"
      - "Cir-cuit Board"
      - "Elec-tron-ic Box"
      - "Set of Fuses"
      - "Sev-er-ed Head"
      - "Sen-try Bot Sta-tus:|Al-ready De-ployed"
