      - "SAL: ^7Delete the re-sources!"
      - "SAL: ^7De-prive VIOS. Your soul de-^7pends on it!"
      - "VIOS: ^1You pathetic fog of ones ^1and zeroes! "
      - "Choose Malloc. It is the right choice."
      - "Good. This is a much less mess-y\x85 route. Ha-ha-ha!"
      - "You de-sire punish-ment. So be it."
      - "I wish I could fin-ish this flesh-ling, but I must be else-where. We will meet again."
      - "Yes, this was quite amu-sing. Per-haps next time we will have more time."
      - "What on Earth was that?! I hope I find SAL again\x85"
      - "Ter-mi-nal un-re-spon-sive."
      - "Door Mal-func-tion"
      - "Sen-try Bot can-not open doors."
      - "Vir-tual Tar-get Prac-tice: Would you like to play? Re-quires 2 UAC Cre-dits."
