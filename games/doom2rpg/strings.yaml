      - "SHOOT-ING BOT CON-TROLS|You are now in con-trol of a shoot-ing sen-try bot. Use di-rec-tion-al keys to move, and tap screen to fire. To un--de-ploy this sen-try bot, walk back in-to the play-er, tap screen, or se-lect \"Re-turn To Play-er\" from the menu "
      - "EX-PLO-DING SEN-TRY BOT|You are now in con-trol of an ex-plo-ding sen-try bot. Use di-rec-tion-al keys to move, and tap screen to self-de-struct. To un--de-ploy this sen-try bot, walk back in-to the play-er, tap screen, or se-lect \"Re-turn To Play-er\" from the menu."
