      - "We hadn't been aware a res-cue was need-ed\x85 so no. But it seems we're in need of one. I'm try-ing to fig-ure out what's go-ing on."
      - "I don't know much. Peo-ple have been get-ting real-ly se-cret-ive. I do know that some folks came through here a lit-tle earlier and head-ed to the oth-er side of this fa-cil-i-ty. Is that where you're head-ed?"
      - "Yes, if that's where they went."
      - "Well, you'll need a se-cu-ri-ty key-card to get over to that side. I gave mine to Caldex just a lit-tle bit ago but he might still be around. May-be you can find him."
      - "Caldex? Great! I'll go look for him."
      - "He was near\x85 wait\x85 what was that\x85?"
      - "Oh hi there lit-tle guy. You're not so scary\x85"
      - "AAHHHhhhh\x85"
      - "WARN-ING:|Jump-ing down an ele-va-tor shaft is prob-a-bly not the wis-est course of ac-tion."
      - "Ele-va-tor Mal-func-tion"
      - "Ele-va-tor Shaft"
      - "Need Red Key-card"
      - "Need Blue Key-card"
      - "Find a Red Key-card to open the Red Door."
      - "Find the Blue Key-card."
      - "Find the switch that opens the se-cret lab."
      - "Find Caldex. He may have a key-card you need."
      - "Log 2144--01--12:|Spe-ci-mens cap-tu-red fol-low-ing the ini-ti-al pri-ma-ry por-tal grid pow-er-up. Suc-cess-ful-ly sus-pend-ed in sta-sis for fur-ther stu-dy.|-- X. Zanax"
      - "Log 2144--01--13:|Have just re-ceived con-fir-ma-tion from Dr. Gue-rard on Mars that he is en-coun-ter-ing si-mi-lar fau-na in his lat-est re-search.|-- X. Zanax"
      - "Log 2144--02--07:|We are clas-si-fying this spe-ci-men as an \"imp,\" though my as-sis-tant has tak-en to on-o-mat-o-po-et-i-cal-ly call-ing it \"Gwocklego\" af-ter its cu-ri-ous vo-cal-iza-tions.|-- X. Zanax"
      - "Log 2144--02--08:|This imp seems par-tic-u-lar-ly re-sis-tant to sta-sis sus-pen-sion. It ap-pears sta-ble for now, but ex-er-cise ex-treme cau-tion when han-dling.|-- X. Zanax"
      - "Log 2144--02--05:|The crea-tures are high-ly re-sis-tant to pain and in-jury, which has made spe-ci-men acq-ui-si-tion trou-ble-some. It's been dif-fi-cult to sub-due a crea-ture with-out mor-tal-ly wound-ing it.|-- X. Zanax"
      - "Log 2144--02--06:|Ad-di-ti-on-al-ly, in-it-ial field re-ports in-di-cate the crea-tures ex-hi-bit var-y-ing tol-er-ance for dif-fer-ent types of weap-on at-tacks. Ex-per-i-men-ta-tion will help us de-ter-mine the most ef-fi-cient means of sub-du-ing these crea-tures.|-- X. Zanax"
      - "No more logs."
      - "GAAAH!"
      - "Sneaky!"
      - "Cir-cuit Board"
      - "Elec-tron-ic Box"
      - "Set of Fuses"
      - "Un-rec-og-niz-able Parts"
      - "(Be-hind the Door) STOP! Don't send that bot through the por-tal, you idi-ot! We won't be able to sta-bi-lize it! STOP! LOOK OUT!"
      - "Now you've done it!"
      - "We have no con-trol over that por-tal now!"
      - "Now what?"
      - "AAAHH-HHH!"
      - "What in Hades?"
      - "POI-SONED|Each turn with-in the pes-ti-cide de-creas-es 10 ac-cu-ra-cy (max --30) and 10 health points. Ef-fects last 30 turns."
      - "*cough* Don't go in there! *cough* A pes-ti-cide tank blew. The whole place is gas-sed and very nox-ious. It's no place for hu-mans\x85 ro-bots may-be, but not hu-mans. Now if you'll ex-cuse me, I've had quite enough of this."
      - "PER-FOR-MANCE READ-ING|Fer-ti-li-zer de-liv-ery sys-tem op-er-at-ing nom-i-nal-ly. How-ev-er, pes-ti-cide sys-tem seems to have mal-func-tion-ed. Call main-te-nance."
      - "Oh\x85kay\x85"
      - "Atrium 02 Log|2144--01--08:|Please do not tend to any-thing in this atrium un-til we have a bet-ter sense of what killed eve-ry-thing here. If you have any in-for-ma-tion to con-tri-bute to the in-ves-ti-ga-tion, please email me di-rect-ly.|-- Dir. Castle"
      - "Sen-ding bots through por-tals is a no--no."
      - "Sen-try Bot can-not open doors."
      - "Sen-try Bot Sta-tus:|Al-ready De-ployed"
      - "No Bot Ac-cess"
