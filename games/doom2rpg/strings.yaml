      - "Tread-mill: Would you like to use? Re-quires 2 UAC Cre-dits."
      - "Be-gin Work-out"
      - "You do not have enough UAC Cre-dits."
      - "Green-house Log|2144--02--26:|In spite of hav-ing to work around Dr. Zanax's\x85 well, what-ever he's up to, we've man-aged some real break-throughs. The adap-ted hydro-ponics with the new ap-proach to pro-ces-sing the lunar re-golith is ex-tre-me-ly pro-mis-ing."
      - "Green-house Log|2144--03--09:|I want to go on re-cord with a com-plaint about Dr. Zanax. His con-stant re-di-rec-tion of pow-er, per-son-nel, and oth-er re-sources has se-ri-ous-ly hind-er-ed our abi-li-ty to work.|--Dr. Spen-cer."
      - "Caldex?!"
      - "Oh, hi. I know you, don't I? *sniff * *cough* "
      - "Oh, hel-lo Major! *sniff* *cough*"
      - "Oh, hel-lo Sarge!"
      - "Oh, hel-lo Dr. O'Reilly"
      - "What are you do-ing run-ning on the tread-mill at a time like this?"
      - "Oh come on, tell me you haven't done the same to work on your butt\x85 er, I mean agi-li-ty\x85 *cough*"
      - "What's go-ing on? Where are the oth-ers?"
      - "They moved on to the oth-er side of the fa-cil-i-ty fol-low-ing a lead about some por-tal tech-nol-ogy. *sniff* Why there's por-tal tech in an argicult\x85 agritur\x85 plant fa-cil-i-ty es-capes me, and I've been on the Doom for more than a year. I mean Moon."
      - "I need to catch up to them, but I can't with-out a key-card."
      - "Ahh, the Red Key-card. Yes, I've got it. I'll give it to you for 50 UAC cre-dits."
      - "Just kid-ding! Here you go."
      - "I'm go-ing to stay around this pop-corn stand a while un-til I feel a bit bet-ter. I think I got too much pes-ti-cide in my sys-tem."
      - "Okay. Thanks Caldex. Take care of your-self."
      - "You too. I'll see you next week, Mary. *cough*"
      - "Move along. I'll stay and guard the cho-co-late."
      - "Caldex: *huff* *puff* Man, I'm exhausted\x85"
      - "So tired\x85"
      - "\x85need a nap."
      - "Zzzz\x85"
      - "Caldex?  Wake up!"
      - "Zzzz\x85 no, more to the left\x85 zzz\x85 yeah, right there\x85 *snort*"
      - "Why are you sleep-ing in here?"
      - "*wheeze* I got a big lung-ful of pest-i-cide when the tank blew. I figured I'd *hack* come over to the hyd-ro-pon\x85 uh, hyd-ro-cort\x85 uh, the little plant grow-ing lab to chill out for a whi-le. *cough* I feel kind-a woo-zy."
      - "Sorry to hear that."
      - "So am I. *gasp* This is tot-ally put-ting me behind on my jog-ging. *cough*"
      - "Vir-tual Tar-get Prac-tice: Would you like to play? Re-qui-res 2 UAC Cre-dits."
      - "Caldex"
      - "Well Ma-rine, you seem to be do-ing well but don't get over con-fi-dent. VIOS has its sights on you. Be care-ful."
      - "Dr. O'Connor, for a sci-en-tist you have fared much bet-ter than I would have guess-ed. Nev-er-the-less, you could use some help. Near the pes-ti-cide con-tam-i-na-tion there's an al-cove with two Sen-try Bot ter-mi-nals. Be-hind the Sen-try Bot on the right is a se-cret room with sup-plies. Good luck."
      - "I think I'm start-ing to grow on you SAL."
      - "Thank you, SAL."
      - "Thank you, SAL, but I did find that on my own. Do you have any oth-er in-for-ma-tion?"
      - "Some hu-mans are toy-ing with dan-ger. The forces that have been un-leashed can-not be eas-i-ly stop-ped and this evil has leapt in-to the vir-tual world. This must be stop-ped."
      - "We'll do what needs to be done."
      - "This must be stop-ped how?"
      - "Do what-ever you can. There is great per-il."
      - "Major, watch your step! A cou-ple of work-ers al-ready fell to their deaths. The Doc-tor and I were look-ing in-to some-thing about por-tals when this whole area start-ed com-ing down. We'll con-tin-ue our search. You'll need to find anoth-er way through."
      - "Ser-geant, watch your step! A cou-ple of work-ers al-ready fell to their deaths. The Doc-tor and I were look-ing in-to some-thing about por-tals when this whole area start-ed com-ing down. We'll con-tin-ue our search. You'll need to find anoth-er way through."
      - "Dr. O'Connor, watch your step! A cou-ple of work-ers al-ready fell to their deaths. Sarge and I were look-ing in-to some-thing about por-tals when this whole area start-ed com-ing down. We'll con-tin-ue our search. You'll need to find anoth-er way through."
      - "There's a se-cret lab near-by but I on-ly got the en-try code. I should be able to re-veal the switch re-motely from here. There, that ought to do it. It should be pret-ty easy to find the switch now."
      - "You're go-ing to need the blue key-card for the switch. One of the sci-en-tists had it, but we're not sure what hap-pened to him. The key-card could be any-where. I'd look through dead bod-ies, just in case. Good luck. We'll see you on the oth-er side."
      - "Here goes noth-ing!"
      - "I won-der how that beast got a hold of the key-card\x85 un-less\x85 I'm creep-ing my-self out. Bet-ter high tail it out of here!"
      - "GRRR!"
