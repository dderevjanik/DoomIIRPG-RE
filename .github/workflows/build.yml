name: Build

on:
  push:
    # branches: [main, engine-2]
  pull_request:
    # branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsdl2-dev zlib1g-dev libopenal-dev libgl-dev ccache

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-${{ hashFiles('src/**', 'CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: ccache-linux-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TOOLS=OFF -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Print ccache stats
        run: ccache -s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drpg-engine-linux
          path: build/src/DRPGEngine

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: brew install sdl2 openal-soft ccache

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ hashFiles('src/**', 'CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: ccache-macos-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TOOLS=OFF -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Print ccache stats
        run: ccache -s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drpg-engine-macos
          path: build/src/DRPGEngine

