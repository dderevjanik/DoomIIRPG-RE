name: Build

on:
  push:
    # branches: [main, engine-2]
  pull_request:
    # branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          # TODO: Remove LLVM/Clang once ubuntu-latest ships GCC 15+ with full C++23 library support (<print>, <flat_map>)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-19 main"
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsdl2-dev zlib1g-dev libopenal-dev libgl-dev ccache \
            clang-19 libc++-19-dev libc++abi-19-dev

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-${{ hashFiles('src/**', 'CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: ccache-linux-

      - name: Configure
        run: |
          export CC=clang-19
          export CXX=clang++-19
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++"

      - name: Build
        run: cmake --build build --parallel


      - name: Print ccache stats
        run: ccache -s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drpg-engine-linux
          path: build/src/DRPGEngine

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        # TODO: Remove Homebrew LLVM once Apple Clang ships full C++23 library support
        run: brew install llvm sdl2 openal-soft ccache

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ hashFiles('src/**', 'CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: ccache-macos-

      - name: Configure
        run: |
          export CC=$(brew --prefix llvm)/bin/clang
          export CXX=$(brew --prefix llvm)/bin/clang++
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel


      - name: Print ccache stats
        run: ccache -s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drpg-engine-macos
          path: build/src/DRPGEngine

