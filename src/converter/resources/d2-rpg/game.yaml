# D2RPG - Game Definition
# This is the default game that ships with the engine.

game:
  name: D2RPG
  description: Classic D2RPG game module for DRPG Engine
  version: "1.0"

  # Window title (defaults to name if not set)
  window_title: D2RPG By [GEC]

  # Save directory for config/profile data
  save_dir: Doom2rpg.app

  # Entry map (first map loaded on new game)
  entry_map: map00

  # Optional intro played before the main menu. Omit the block to skip.
  intro:
    type: travel_map
    file: data/intro_camera.yaml

  # Levels are auto-discovered by scanning levels/*/level.yaml at startup.
  # Each level.yaml may declare `id: <int>` to be addressable by the engine.
  # Levels without `id:` are still on disk (editor-openable), just unreachable
  # at runtime. Duplicate ids are a fatal error.

  # String tables — maps group index to YAML file path.
  # Modders can add/reorder groups or point to custom files.
  strings:
    0: strings/CodeStrings.yaml
    1: strings/EntityStrings.yaml
    2: strings/FileStrings.yaml
    3: strings/MenuStrings.yaml
    4: levels/01_tycho/strings.yaml
    5: levels/02_cichus/strings.yaml
    6: levels/03_kepler/strings.yaml
    7: levels/04_uac_admin/strings.yaml
    8: levels/05_uac_labs/strings.yaml
    9: levels/06_uac_r_d/strings.yaml
    10: levels/07_gehenna/strings.yaml
    11: levels/08_abaddon/strings.yaml
    12: levels/09_vios/strings.yaml
    13: levels/10_test_map/strings.yaml
    14: strings/Translations.yaml

  # Entity definition files — loaded and merged in order.
  entities:
    - monsters.yaml
    - npcs.yaml
    - pickups.yaml
    - decorations.yaml

  # Subdirectories to search when resolving asset files.
  # The engine tries the exact path first, then searches these dirs in order.
  search_dirs:
    - config
    - ui
    - hud
    - fonts
    - levels/textures
    - audio
    - comicbook
    - data

  # Player configuration
  player:
    starting_max_health: 100

    # Level-up stat grants
    level_up:
      health: 10
      defense: 1
      strength: 2
      accuracy: 1
      agility: 3

    # Buff/status effect constants
    expire_duration: 5           # buff expiration turns
    max_display_buffs: 6         # max buffs shown on HUD
    ice_fog_dist: 1024           # ice fog visibility distance
    max_notebook_indexes: 8      # notebook capacity
    bits_per_vm_try: 3           # bits per vending machine attempt

    # Out-of-combat cooldown (turns since last combat)
    out_of_combat_turns: 4

    # XP formula coefficients: linear*n + cubic*((n-1)^3 + (n-1))
    xp_formula:
      linear: 500
      cubic: 100

    # Inventory/ammo capacity caps
    caps:
      credits: 9999
      inventory: 999
      ammo: 100
      bot_fuel: 5
      armor: 200                 # max armor value

    # Familiar (sentry bot) max health
    familiar_max_health: 100

  # Combat timing/scale constants
  combat:
    max_active_missiles: 8
    placing_bomb_time: 750       # ms to place a bomb
    bomb_recover_time: 500       # ms recovery after bomb placement
    weapon_scale: 131072         # fixed-point weapon rendering scale (17-bit FP)
    lower_weapon_time: 200       # ms to lower weapon animation
    lowered_weapon_y: 38         # Y offset for lowered weapon position
    explosion_offset: 48         # explosion sprite offset
    explosion_offset2: 38        # secondary explosion offset
    placing_bomb_z: 18           # Z offset for bomb placement visual
    rock_time_damage: 200        # screen-shake duration on damage (ms)
    rock_time_dodge: 800         # screen-shake duration on dodge (ms)
    rock_dist_combat: 6          # screen-shake distance in combat

  # HUD timing constants
  hud:
    msg_display_time: 700        # base message display time (ms)
    msg_flash_time: 100          # message flash/fade time (ms)
    scroll_start_delay: 750      # delay before text starts scrolling (ms)
    ms_per_char: 64              # ms per character for scrolling text
    bubble_text_time: 1500       # speech bubble display time (ms)
    sentry_bot_icons_padding: 15 # padding for sentry bot icons
    damage_overlay_time: 1000    # damage vignette overlay duration (ms)
    action_icon_size: 18         # action icon pixel size
    arrows_size: 12              # arrow control pixel size

  # Render timing/visual constants
  render:
    changemap_fade_time: 1000    # fade duration for map transitions (ms)
    hold_brightness_time: 500    # hold at max brightness (ms)
    fade_brightness_time: 500    # fade from max brightness (ms)
    max_vscroll_velocity: 30     # max vertical scroll velocity
    max_initial_vscroll_velocity: 90  # max initial scroll velocity
    portal_max_radius: 66        # portal visual max radius
    anim_idle_time: 8192         # idle animation cycle time
    anim_idle_switch_time: 256   # idle animation switch interval
    max_dizzy: 30                # max dizzy effect intensity
    latency_adjust: 50           # latency adjustment for animations (ms)
    fear_eye_size: 8             # fear-eye sprite size

  # Automap display configuration
  automap:
    cell_size: 8                   # pixel size of each map cell
    offset_x: 112                  # X offset of map grid on screen
    offset_y: 32                   # Y offset of map grid on screen
    blink_interval: 333            # quest marker blink interval (ms)
    entity_colors:
      entrance: 0xFF00FF00        # green — map entrance marker
      exit: 0xFFFF0000            # red — map exit marker
      visited: 0xFF90B9E7         # light blue — visited tile
      background: 0xFF2A3657      # dark blue — unvisited/background
      ladder: 0xFFFFFF00          # yellow — ladder marker
      ladder_stripe: 0xFF000000   # black — ladder stripe overlay
      npc: 0xFF0000FF             # blue — NPC marker
      interactive: 0xFF8000FF     # purple — interactive entity
      monster: 0xFFFF8000         # orange — monster marker
      wall: 0xFF8D8068            # brown — wall/decor
      god_mode_item: 0xFF00FFEA   # cyan — item (god mode only)
      quest_blink_a: 0xFFFF0000   # red — quest objective blink A
      quest_blink_b: 0xFF00FF00   # green — quest objective blink B

  # Scoring formula constants
  scoring:
    per_level: 1000
    all_levels_bonus: 1000
    no_deaths_bonus: 1000
    death_penalty_base: 5
    death_penalty_mult: 50
    many_deaths_penalty: 250
    death_threshold: 10
    time_bonus_minutes: 120
    time_bonus_mult: 15
    move_threshold: 5000
    move_divisor: 2
    per_secret: 1000
    all_secrets_bonus: 1000

# Config enum name/value mappings (used by settings UI)
config_enums:
  difficulty:
    easy: 1
    normal: 2
    nightmare: 4
  language:
    english: 0
    french: 1
    german: 2
    italian: 3
    spanish: 4
  window_mode:
    windowed: 0
    fullscreen: 1
    borderless: 2
  control_layout:
    chevrons: 0
    dpad: 1
