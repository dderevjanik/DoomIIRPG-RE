screen:
  id: test_settings

  widgets:
    - widget: screen_title
      id: title
      text: "Widget Test Screen"

    - widget: option_menu
      id: options_list
      x: 80
      y: 50
      w: 320
      h: 180
      item_height: 36
      visible_count: 5
      items:
        - id: options
          text: "Options"
          action: goto:options
        - id: option_a
          text: "Option A"
          action: test_action_a
        - id: option_b
          text: "Option B"
          action: test_action_b
        - id: option_c
          text: "Option C"
          action: test_action_c
        - id: back_item
          text: "Back"
          action: back

    - widget: option_checkbox
      id: test_toggle
      y: 240
      w: 200
      text: "Test Toggle"

    - type: button
      id: done_btn
      x: 300
      y: 240
      w: 100
      h: 28
      text: "Done"
      action: back
      highlight_color: 0xFF00AA00
