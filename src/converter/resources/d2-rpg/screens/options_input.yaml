screen:
  id: options_input

  widgets:
    - widget: screen_title
      id: title
      text: "Input Options"

    - widget: option_selector
      id: control_layout
      y: 60
      text: "Control Layout"
      options:
        - label: "Chevrons"
          value: 0
        - label: "D-Pad"
          value: 1

    - widget: option_checkbox
      id: flip_controls
      y: 96
      text: "Flip Controls"

    - widget: option_slider
      id: control_alpha
      y: 132
      text: "Button Alpha"
      min: 0
      max: 255
      step: 15
      value: 255
      fill_color: 0xFFDD8822

    - widget: option_checkbox
      id: vibration_enabled
      y: 176
      text: "Vibration"
      checked: true

    - widget: option_slider
      id: vibration_intensity
      y: 212
      text: "Vibration"
      value: 100
      fill_color: 0xFFDD8822

    - widget: option_slider
      id: deadzone
      y: 248
      text: "Dead Zone"
      value: 15
      fill_color: 0xFFDD8822

    - widget: back_button
      id: back_btn
